<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Real Value Input</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <h1 class="mb-4">Enter a Real Value</h1>
  <form method="post" class="mb-3">
    <div class="input-group">
      <input type="number" step="0.01" name="value" class="form-control" placeholder="Enter number">
      <button class="btn btn-primary" type="submit">Submit</button>
    </div>
  </form>
  {% if value is not none %}
    <div class="alert alert-success">You entered: <strong>{{ value }}</strong></div>
  {% endif %}
  <hr>
  <a class="btn btn-secondary" href="/add">Add Expense</a>
  <a class="btn btn-secondary" href="/expenses">View Expenses</a>
  <a class="btn btn-secondary" href="/total">View Total</a>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
