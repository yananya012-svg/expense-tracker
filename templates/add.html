{% extends "base.html" %}
{% block content %}
<h2>Add Expense</h2>
<form method="post">
  <label>Date: <input type="date" name="date" required></label><br><br>
  <label>Category: <input type="text" name="category"></label><br><br>
  <label>Description: <input type="text" name="description"></label><br><br>
  <label>Amount: <input type="number" step="0.01" name="amount" required></label><br><br>
  <button type="submit">Save</button>
</form>
{% endblock %}
